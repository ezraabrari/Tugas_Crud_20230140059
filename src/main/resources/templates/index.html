<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD KTP - Deployment Perangkat Lunak</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }

        header {
            background: #2c3e50; color: white;
            padding: 16px 24px; font-size: 20px; font-weight: bold;
        }

        .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

        .card {
            background: white; border-radius: 8px;
            padding: 24px; margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 { margin-bottom: 16px; color: #2c3e50; font-size: 18px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group select {
            padding: 9px 12px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #3498db;
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn:hover { opacity: 0.88; }

        .btn-area { margin-top: 16px; display: flex; gap: 10px; }

        #notification {
            padding: 12px 16px; border-radius: 6px;
            margin-bottom: 16px; display: none; font-size: 14px;
        }
        .notif-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .notif-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #2c3e50; color: white; padding: 10px 12px; text-align: left; }
        td { padding: 9px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f8f9fa; }

        .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<header>📋 Sistem CRUD Data KTP</header>

<div class="container">

    <!-- Notifikasi -->
    <div id="notification"></div>

    <!-- Form Input -->
    <div class="card">
        <h2 id="formTitle">➕ Tambah Data KTP</h2>
        <input type="hidden" id="editId">

        <div class="form-grid">
            <div class="form-group">
                <label>Nomor KTP (16 digit)*</label>
                <input type="text" id="nomorKtp" maxlength="16" placeholder="3204010101900001">
            </div>
            <div class="form-group">
                <label>Nama Lengkap*</label>
                <input type="text" id="namaLengkap" placeholder="Budi Santoso">
            </div>
            <div class="form-group">
                <label>Tanggal Lahir*</label>
                <input type="date" id="tanggalLahir">
            </div>
            <div class="form-group">
                <label>Jenis Kelamin*</label>
                <select id="jenisKelamin">
                    <option value="">-- Pilih --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Alamat</label>
                <input type="text" id="alamat" placeholder="Jl. Merdeka No. 1, Bandung">
            </div>
        </div>

        <div class="btn-area">
            <button class="btn btn-primary" onclick="submitForm()">💾 Simpan</button>
            <button class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
        </div>
    </div>

    <!-- Tabel Data -->
    <div class="card">
        <h2>📃 Daftar Data KTP</h2>
        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Nomor KTP</th>
                <th>Nama Lengkap</th>
                <th>Alamat</th>
                <th>Tgl Lahir</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            <tr><td colspan="7" style="text-align:center">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    const API = 'http://localhost:8080/ktp';

    function showNotif(msg, type) {
        $('#notification')
            .removeClass('notif-success notif-error')
            .addClass(type === 'success' ? 'notif-success' : 'notif-error')
            .text(msg).fadeIn(300);
        setTimeout(() => $('#notification').fadeOut(400), 3500);
    }

    function loadData() {
        $.ajax({
            url: API, method: 'GET',
            success: function(res) {
                if (res.success) renderTable(res.data);
                else showNotif(res.message, 'error');
            },
            error: function() { showNotif('Gagal memuat data dari server', 'error'); }
        });
    }

    function renderTable(data) {
        let html = '';
        if (!data || data.length === 0) {
            html = '<tr><td colspan="7" style="text-align:center">Belum ada data</td></tr>';
        } else {
            data.forEach((item, i) => {
                html += `<tr>
                    <td>${i + 1}</td>
                    <td>${item.nomorKtp}</td>
                    <td>${item.namaLengkap}</td>
                    <td>${item.alamat || '-'}</td>
                    <td>${item.tanggalLahir}</td>
                    <td>${item.jenisKelamin}</td>
                    <td>
                        <button class="action-btn btn-warning" onclick="editData(${item.id})">✏️ Edit</button>
                        <button class="action-btn btn-danger"  onclick="deleteData(${item.id}, '${item.namaLengkap}')">🗑️ Hapus</button>
                    </td>
                </tr>`;
            });
        }
        $('#tableBody').html(html);
    }

    function submitForm() {
        const id = $('#editId').val();
        const payload = {
            nomorKtp:    $('#nomorKtp').val().trim(),
            namaLengkap: $('#namaLengkap').val().trim(),
            alamat:      $('#alamat').val().trim(),
            tanggalLahir: $('#tanggalLahir').val(),
            jenisKelamin: $('#jenisKelamin').val()
        };

        if (!payload.nomorKtp || !payload.namaLengkap || !payload.tanggalLahir || !payload.jenisKelamin) {
            showNotif('Harap isi semua field wajib (*)', 'error'); return;
        }

        const method = id ? 'PUT' : 'POST';
        const url    = id ? `${API}/${id}` : API;

        $.ajax({
            url, method,
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function(res) {
                if (res.success) {
                    showNotif(res.message, 'success');
                    resetForm(); loadData();
                } else {
                    showNotif(res.message, 'error');
                }
            },
            error: function(xhr) {
                const msg = xhr.responseJSON ? xhr.responseJSON.message : 'Terjadi kesalahan';
                showNotif(msg, 'error');
            }
        });
    }

    function editData(id) {
        $.ajax({
            url: `${API}/${id}`, method: 'GET',
            success: function(res) {
                if (res.success) {
                    const d = res.data;
                    $('#editId').val(d.id);
                    $('#nomorKtp').val(d.nomorKtp);
                    $('#namaLengkap').val(d.namaLengkap);
                    $('#alamat').val(d.alamat);
                    $('#tanggalLahir').val(d.tanggalLahir);
                    $('#jenisKelamin').val(d.jenisKelamin);
                    $('#formTitle').text('✏️ Edit Data KTP');
                    window.scrollTo(0, 0);
                }
            }
        });
    }

    function deleteData(id, nama) {
        if (!confirm(`Hapus data KTP milik "${nama}"?`)) return;
        $.ajax({
            url: `${API}/${id}`, method: 'DELETE',
            success: function(res) {
                showNotif(res.message, res.success ? 'success' : 'error');
                if (res.success) loadData();
            },
            error: function() { showNotif('Gagal menghapus data', 'error'); }
        });
    }

    function resetForm() {
        $('#editId, #nomorKtp, #namaLengkap, #alamat, #tanggalLahir').val('');
        $('#jenisKelamin').val('');
        $('#formTitle').text('➕ Tambah Data KTP');
    }

    // Load data saat halaman siap
    $(document).ready(function() { loadData(); });
</script>
</body>
</html>
